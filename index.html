<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沖煮助手 · Brew Studio</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="沖煮助手">
<meta name="theme-color" content="#f3e9da">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232a1c12'/%3E%3Ccircle cx='50' cy='50' r='26' fill='%23caa06b'/%3E%3Ccircle cx='50' cy='50' r='26' fill='none' stroke='%23fff5e1' stroke-opacity='.4' stroke-width='2'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Shippori+Mincho+B1:wght@700;800&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" aria-hidden="true"><defs><linearGradient id="markGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bf6b32"/><stop offset="0.6" stop-color="#bf6b32"/><stop offset="1" stop-color="#8D5B3D"/></linearGradient></defs><path fill="url(#markGrad)" d="M11 18q-2.925 0-4.962-2.037T4 11V5q0-.825.588-1.412T6 3h12.5q1.45 0 2.475 1.025T22 6.5t-1.025 2.475T18.5 10H18v1q0 2.925-2.037 4.963T11 18M6 8h10V5H6zm12 0h.5q.625 0 1.063-.437T20 6.5t-.437-1.062T18.5 5H18zM5 21q-.425 0-.712-.288T4 20t.288-.712T5 19h14q.425 0 .713.288T20 20t-.288.713T19 21z"/></svg></div>
      <h1>Brew Studio</h1>
    </div>
    <button class="backbtn" id="backBtn" style="display:none" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>方法
    </button>
  </div>

  <!-- ============ HOME ============ -->
  <section class="view active stagger" id="view-home">
    <div class="hero">
      <h2>今天，<br>想喝<b>怎樣的咖啡？</b></h2>
      <p>依手上的豆子與想要的風味，挑一個沖煮法。預覽完整步驟後，跟著計時器一步步沖。</p>
    </div>

    <div class="section-h"><span class="num">01</span><h3>依風味快速挑選</h3></div>
    <div class="goals" id="goals"></div>

    <div class="section-h"><span class="num">02</span><h3>所有沖煮法</h3></div>
    <div class="cards" id="cards"></div>

    <div class="footnote">配方整理自 James Hoffmann 與粕谷哲（Tetsu Kasuya）之公開沖煮法。<br>水溫、秒數為建議值，請依個人口味微調。</div>
  </section>

  <!-- ============ PREVIEW ============ -->
  <section class="view stagger" id="view-preview">
    <div class="ph">
      <div class="sub" id="pv-sub"></div>
      <h2 id="pv-name"></h2>
      <div class="desc" id="pv-desc"></div>
    </div>
    <div class="params" id="pv-params"></div>
    <div class="section-h"><h3>沖煮步驟</h3><span class="hint" id="pv-count"></span></div>
    <div class="timeline" id="pv-steps"></div>
    <div class="cta-scrim" aria-hidden="true"></div>
    <button class="startbtn" onclick="startBrew()">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12.275 19q.3-.025.513-.238T13 18.25q0-.35-.225-.562T12.2 17.5q-1.025.075-2.175-.562t-1.45-2.313q-.05-.275-.262-.45T7.825 14q-.35 0-.575.263t-.15.612q.425 2.275 2 3.25t3.175.875m-5.987.65Q4 17.3 4 13.8q0-2.5 1.988-5.437T12 2q4.025 3.425 6.013 6.363T20 13.8q0 3.5-2.287 5.85T12 22t-5.712-2.35"/></svg>
      沖煮
    </button>
  </section>

  <!-- ============ BREW ============ -->
  <section class="view" id="view-brew">
    <div class="brewtop">
      <div class="bname" id="bw-name"></div>
      <div class="btime"><b id="bw-clock">0:00</b> / <span id="bw-total"></span></div>
    </div>
    <div class="progress"><i id="bw-prog"></i></div>

    <div class="now" id="bw-now">
      <div class="nx-top">
        <div class="nx-left">
          <span class="nx-step">STEP <b id="bw-stepnum">1</b><i id="bw-steptot"> / 1</i></span>
          <h3 class="nx-name" id="bw-steplabel"></h3>
          <b class="nx-cd" id="bw-cd">0:00</b>
        </div>
        <div class="nx-block">
          <div class="nx-row"><span>閥門</span><b class="nx-v" id="bw-valveval">—</b></div>
          <div class="nx-row"><span>水溫</span><b class="nx-v" id="bw-temp">—</b></div>
          <div class="nx-row"><span>累計</span><span class="nx-w"><b id="bw-water">—</b><i id="bw-watersub"></i></span></div>
        </div>
      </div>
      <div class="nact" id="bw-act"></div>
      <div class="nnote" id="bw-note"></div>
    </div>

    <div class="list">
      <h4>全部步驟</h4>
      <div id="bw-list"></div>
    </div>
    <div style="height:80px"></div>

    <div class="cta-scrim" aria-hidden="true"></div>
    <div class="controls">
      <button class="ctrl ghost" id="bw-reset" onclick="resetBrew()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>重來
      </button>
      <button class="ctrl primary" id="bw-toggle" onclick="toggleTimer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="6 4 20 12 6 20 6 4" fill="currentColor" stroke="none"/></svg>
        <span id="bw-togglelabel">開始計時</span>
      </button>
    </div>
  </section>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
